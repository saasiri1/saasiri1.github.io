<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="imgs/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/style/output.css" rel="stylesheet">

    <title>Sultan Asiri</title>
  </head>
  <body>
    <!-- Homepage -->
  
    <nav class=" border-b-2 lg:border-b-0 lg:pb-0 mt-4 mb-10 py-2">
        <div class="flex flex-row lg:flex-col justify-center">
            <nav class="flex justify-center ">
                <a class="uppercase hover:bg-gray-200 lg:mr-4 px-2 lg:py-1 rounded mt-2 lg:mt-5 text-xs lg:text-base lg:block" href="/"><img src="../imgs/theme-3-corrected.png" alt="The University of Alabama" class="w-36 hidden lg:block "></a>
                <a class="uppercase hover:bg-gray-200 lg:mr-4 px-2 lg:py-1 rounded mt-2 lg:mt-5 text-xs lg:text-base lg:block " href="/">Home</a>
                <a class="uppercase hover:bg-gray-200 lg:mr-4 px-2 lg:py-1 rounded mt-2 lg:mt-5 text-xs lg:text-base lg:block" href="/#news">News</a>
                <a class="uppercase hover:bg-gray-200 lg:mr-4 px-2 lg:py-1 rounded mt-2 lg:mt-5 text-xs lg:text-base lg:block" href="/#resume">Resume</a>
                <a class="uppercase hover:bg-gray-200 lg:mr-4 px-2 lg:py-1 rounded mt-2 lg:mt-5 text-xs lg:text-base lg:block" href="/#publication">Publication</a>
                <a class="uppercase hover:bg-gray-200 lg:mr-4 px-2 lg:py-1 rounded mt-2 lg:mt-5 text-xs lg:text-base lg:block" href="/#projects">projects</a>
                
            </nav>
        </div>
    </nav>
          <div class="grid grid-row lg:grid-cols-3">
                <div >
                    <div class="lg:fixed lg:left-0 w-full flex flex-col items-center lg:h-screen lg:w-1/3 ">
                  <div id='image' class="">
                    <img src="imgs/profile_img.jpg" alt="Sultan Asiri image" class="w-36 lg:w-60 rounded-full">
                  </div>
                  <h1 class="text-3xl font-bold font-serif mt-3 text-red-800">{{title}}</h1>
                  <div class="w-80 mt-4 text-justify ">
                    {{bio}}
                  </div>
                  <div id="researchInterest">
                    <h2 class="text-2xl font-bold mt-5 ">{{subbio}}</h2>
                    <ul class="list-disc lg:ml-10">
                      <li>{{subbioList}}</li>
                    </ul>
                  </div>
                    <div class="flex flex-row mt-5">
                        <a href="#" class="hover:text-red-500 mr-4 w-9 mt-0.5"><img src="imgs/linkedin.svg" alt="" srcset=""></a>
                        <a href="#" class="hover:text-red-500 mr-4 w-9"><img src="imgs/researchgate-square.svg" alt=""></a>
                        <a href="#" class="hover:text-red-500 mr-4 w-9"><img src="imgs/google-scholar-square.svg" alt=""></a>
                    </div>
              </div>
            </div>
            
              <div class="w-full lg:w-full lg:col-span-2 break-words">                
   
                  <div class="m-10 text-justify md:border-l  md:px-5" id="projects">
                      <h2 class="text-2xl font-bold text-red-800 my-5">{{section}}</h2>
                      
                      <h2 class="text-xl ml-3 my-3 font-bold ">{{subsection}}</h2>
                      
                      <div class="m-10 text-justify">

                        {{subsectionContent}}
                            <ul class="list-disc ml-10 font-semibold mt-3">
                              <li>{{subsectionList}}</li>
                          </ul>
                      </div>
                      
                    
                  </div>
                    
              </div>
              <div class="w-full"></div>
                    

          </div>



  </body>
</html>
