short_bio: Dr. Sultan Asiri is an Assistant Professor at King Khalid University with a Ph.D. in Computer Science from The University of Alabama. His research focuses on applied NLP, AI security, adversarial attacks, deep learning, and geospatial analysis. Dr. Asiri is also a reviewer for major conferences and journals, including IEEE and ACM. 
